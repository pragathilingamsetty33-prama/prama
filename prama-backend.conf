server {
    listen 443 ssl;
    server_name prama.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/prama.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prama.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large E2EE attachment uploads
    client_max_body_size 50M;

    # Serve Web Frontend (React/Vite)
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API requests to Backend
    location /api {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSockets with timeout extensions
    location /ws {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prevent Nginx from closing WebSocket after 60s of inactivity
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 80;
    server_name prama.duckdns.org;
    if ($host = prama.duckdns.org) {
        return 301 https://$host$request_uri;
    }
    return 404;
}
