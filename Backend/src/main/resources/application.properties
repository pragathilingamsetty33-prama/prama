spring.application.name=prama

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Flyway Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.placeholders.admin.username=${ADMIN_USER}
spring.flyway.placeholders.admin.email=${ADMIN_EMAIL}
spring.flyway.placeholders.admin.password.hash=${ADMIN_PASSWORD_HASH}


# JWT Configuration
# Note: In production, generate a secure, random 256-bit key
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# 15 minutes in milliseconds
application.security.jwt.expiration=${JWT_EXPIRATION}
# 4 months in milliseconds (approx 120 days)
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION}
FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.upload.dir=./uploads/

# CloudAMQP RabbitMQ Broker Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}

